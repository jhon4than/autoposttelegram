<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Entrar · AutoPost Telegram</title><link rel="stylesheet" href="/assets/style.css"></head><body class="login-body"><main class="login-card"><div class="brand"><span class="brand-icon">➤</span><div><strong>AutoPost</strong><small>Telegram</small></div></div><div><span class="eyebrow">PAINEL PRIVADO</span><h1>Bem-vindo de volta</h1><p class="muted">Entre para organizar sua biblioteca e suas publicações.</p></div><form id="loginForm"><label>E-mail<input type="email" name="email" required autocomplete="email" placeholder="voce@email.com"></label><label>Senha<input type="password" name="password" required autocomplete="current-password" placeholder="••••••••"></label><button class="primary" type="submit">Entrar no painel <span>→</span></button><p id="error" class="error"></p></form><small class="secure">● Conexão segura e acesso protegido</small></main><script>loginForm.onsubmit=async e=>{e.preventDefault();error.textContent='';const b=Object.fromEntries(new FormData(e.target));const r=await fetch('/api/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(b)});const j=await r.json();if(r.ok)location='/';else error.textContent=j.error}</script></body></html>
